<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1e1e1e; color: #e0e0e0; overflow-x: hidden; }

/* Results count header */
.results-header { padding: 10px 12px 0; font-size: 13px; color: #999; }
.results-header strong { color: #fff; }

/* Carousel wrapper with scroll arrows */
.carousel-wrap { position: relative; }
.carousel { display: flex; gap: 12px; overflow-x: auto; padding: 8px 12px 12px; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }
.carousel::-webkit-scrollbar { height: 6px; }
.carousel::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
.scroll-arrow { position: absolute; top: 50%; transform: translateY(-50%); z-index: 5; background: rgba(0,0,0,0.7); color: #fff; border: none; width: 32px; height: 32px; border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.scroll-arrow:hover { background: rgba(0,0,0,0.9); }
.scroll-left { left: 4px; }
.scroll-right { right: 4px; }

/* Vehicle card */
.card { min-width: 220px; max-width: 220px; height: 290px; background: #2a2a2a; border-radius: 12px; overflow: hidden; scroll-snap-align: start; flex-shrink: 0; display: flex; flex-direction: column; }
.card-img { width: 100%; height: 140px; object-fit: cover; background: #333; }
.card-body { padding: 10px; display: flex; flex-direction: column; flex: 1; }
.card-price { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.75); color: #fff; padding: 4px 10px; border-radius: 20px; font-weight: 700; font-size: 14px; }
.card-badge { position: absolute; bottom: 8px; left: 8px; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.badge-new { background: #16a34a; color: #fff; }
.badge-cpo { background: #2563eb; color: #fff; }
.badge-used { background: #71717a; color: #fff; }
.card-img-wrap { position: relative; cursor: pointer; flex-shrink: 0; }
.card-title { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 4px; line-height: 1.3; height: 34px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-meta { font-size: 11px; color: #999; margin-bottom: 2px; }
.card-loc { font-size: 10px; color: #777; }
.card-btn { display: block; width: 100%; padding: 8px; margin-top: auto; background: #3b82f6; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; }
.card-btn:hover { background: #2563eb; }
.card-btn.active { background: #1d4ed8; }

/* Browse all card */
.card-browse { min-width: 220px; max-width: 220px; height: 290px; background: #2a2a2a; border-radius: 12px; overflow: hidden; scroll-snap-align: start; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; cursor: pointer; text-decoration: none; }
.card-browse:hover { background: #333; }
.card-browse .browse-icon { font-size: 32px; margin-bottom: 12px; }
.card-browse .browse-text { font-size: 14px; font-weight: 600; color: #3b82f6; margin-bottom: 4px; }
.card-browse .browse-sub { font-size: 11px; color: #999; }

/* Detail panel — inline below carousel */
.detail-panel { display: none; background: #1e1e1e; border-top: 1px solid #333; }
.detail-panel.active { display: block; }
.detail-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; background: #2a2a2a; }
.detail-header h2 { font-size: 15px; color: #fff; flex: 1; padding-right: 12px; }
.close-btn { background: none; border: none; color: #999; font-size: 22px; cursor: pointer; padding: 4px 8px; line-height: 1; }
.close-btn:hover { color: #fff; }

/* Photo gallery */
.gallery { position: relative; width: 100%; background: #111; }
.gallery img { width: 100%; height: 280px; object-fit: contain; background: #111; }
.gallery-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); color: #fff; border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.gallery-nav:hover { background: rgba(0,0,0,0.8); }
.gallery-prev { left: 8px; }
.gallery-next { right: 8px; }
.gallery-counter { position: absolute; bottom: 8px; right: 12px; background: rgba(0,0,0,0.7); color: #fff; padding: 3px 10px; border-radius: 12px; font-size: 12px; }

/* Price/mileage row */
.price-row { display: flex; justify-content: space-between; align-items: baseline; padding: 12px 16px; border-bottom: 1px solid #333; }
.price-row .mileage { font-size: 14px; color: #999; }
.price-row .price { font-size: 22px; font-weight: 700; color: #3b82f6; }

/* Vehicle specs */
.specs { padding: 12px 16px; }
.specs-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #333; }
.spec-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
.spec-value { font-size: 14px; color: #e0e0e0; margin-top: 2px; }
.spec-item { flex: 1; }

/* Dealer section */
.dealer-section { padding: 14px 16px; border-top: 1px solid #333; }
.dealer-name { font-size: 15px; font-weight: 600; color: #fff; }
.dealer-loc { font-size: 13px; color: #999; margin-top: 2px; }

/* Action button */
.actions { padding: 14px 16px; }
.btn-view { display: block; width: 100%; padding: 13px; background: transparent; color: #3b82f6; border: 2px solid #3b82f6; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; text-align: center; text-decoration: none; }
.btn-view:hover { background: rgba(59,130,246,0.1); }

.empty { padding: 40px; text-align: center; color: #888; }
</style>
</head>
<body>
<div id="results-header" class="results-header" style="display:none"></div>
<div class="carousel-wrap">
  <button class="scroll-arrow scroll-left" onclick="scrollCarousel(-1)" id="scroll-left" style="display:none">&lsaquo;</button>
  <div id="carousel" class="carousel">
    <div class="empty">Searching vehicles...</div>
  </div>
  <button class="scroll-arrow scroll-right" onclick="scrollCarousel(1)" id="scroll-right" style="display:none">&rsaquo;</button>
</div>
<div id="detail" class="detail-panel"></div>

<script>
var vehicles = [];
var totalCount = 0;
var currentPhoto = 0;
var selectedIndex = -1;

window.addEventListener('message', function(event) {
  if (event.source !== window.parent) return;
  var msg = event.data;
  if (!msg) return;

  if (msg.jsonrpc === '2.0' && msg.method === 'ui/notifications/tool-result') {
    var data = msg.params && msg.params.structuredContent ? msg.params.structuredContent : (msg.params && msg.params.result && msg.params.result.structuredContent ? msg.params.result.structuredContent : null);
    if (data && data.vehicles) {
      vehicles = data.vehicles;
      totalCount = data.total || vehicles.length;
      selectedIndex = -1;
      renderCarousel();
      closeDetail();
    }
  }

  if (msg.type === 'vehicle-data' && msg.vehicles) {
    vehicles = msg.vehicles;
    totalCount = msg.total || vehicles.length;
    selectedIndex = -1;
    renderCarousel();
    closeDetail();
  }
});

function renderCarousel() {
  var container = document.getElementById('carousel');
  var header = document.getElementById('results-header');

  if (!vehicles.length) {
    container.innerHTML = '<div class="empty">No vehicles found</div>';
    header.style.display = 'none';
    updateScrollArrows();
    return;
  }

  // Results count
  header.style.display = 'block';
  header.innerHTML = 'Found <strong>' + totalCount.toLocaleString() + '</strong> vehicle' + (totalCount !== 1 ? 's' : '') + (vehicles.length < totalCount ? ' · Showing top ' + vehicles.length : '');

  container.innerHTML = vehicles.map(function(v, i) {
    var price = v.price > 0 ? '$' + v.price.toLocaleString() : 'Contact';
    var title = v.year + ' ' + v.make + ' ' + v.model;
    var meta = v.mileage ? v.mileage.toLocaleString() + ' mi' : '';
    var loc = [v.dealer && v.dealer.city, v.dealer && v.dealer.state].filter(Boolean).join(', ');
    var isActive = i === selectedIndex;
    var btnText = isActive ? 'Hide Details' : 'View Details';
    var btnClass = isActive ? 'card-btn active' : 'card-btn';

    // Condition badge
    var badge = '';
    if (v.condition) {
      var c = v.condition.toLowerCase();
      if (c === 'new') badge = '<span class="card-badge badge-new">New</span>';
      else if (c === 'certified pre-owned' || c === 'cpo') badge = '<span class="card-badge badge-cpo">CPO</span>';
      else if (c === 'used') badge = '<span class="card-badge badge-used">Used</span>';
    }

    return '<div class="card" id="card-' + i + '">' +
      '<div class="card-img-wrap" onclick="toggleDetail(' + i + ')">' +
        '<img class="card-img" src="' + (v.image_url || '') + '" alt="' + title + '" onerror="this.style.display=\'none\'">' +
        badge +
        '<span class="card-price">' + price + '</span>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="card-title">' + title + (v.trim ? ' ' + v.trim : '') + '</div>' +
        '<div class="card-meta">' + meta + '</div>' +
        (loc ? '<div class="card-loc">' + loc + '</div>' : '') +
        '<button class="' + btnClass + '" onclick="toggleDetail(' + i + ')">' + btnText + '</button>' +
      '</div>' +
    '</div>';
  }).join('') +
  '<a class="card-browse" href="https://iqautodeals.com/cars" target="_blank">' +
    '<div class="browse-icon">&#x1F50D;</div>' +
    '<div class="browse-text">Browse All Vehicles</div>' +
    '<div class="browse-sub">View full inventory on IQ Auto Deals</div>' +
  '</a>';

  updateScrollArrows();
}

function scrollCarousel(dir) {
  var el = document.getElementById('carousel');
  el.scrollBy({ left: dir * 240, behavior: 'smooth' });
  setTimeout(updateScrollArrows, 400);
}

function updateScrollArrows() {
  var el = document.getElementById('carousel');
  var leftBtn = document.getElementById('scroll-left');
  var rightBtn = document.getElementById('scroll-right');
  if (!vehicles.length) {
    leftBtn.style.display = 'none';
    rightBtn.style.display = 'none';
    return;
  }
  leftBtn.style.display = el.scrollLeft > 10 ? 'flex' : 'none';
  rightBtn.style.display = el.scrollLeft < el.scrollWidth - el.clientWidth - 10 ? 'flex' : 'none';
}

document.getElementById('carousel').addEventListener('scroll', function() {
  updateScrollArrows();
});

function toggleDetail(index) {
  if (selectedIndex === index) {
    closeDetail();
    return;
  }
  selectedIndex = index;
  currentPhoto = 0;
  renderCarousel();
  showDetail(index);
}

function showDetail(index) {
  var v = vehicles[index];
  var photos = v.photos && v.photos.length ? v.photos : (v.image_url ? [v.image_url] : []);
  var price = v.price > 0 ? '$' + v.price.toLocaleString() : 'Contact dealer';
  var title = (v.condition || '') + ' ' + v.year + ' ' + v.make + ' ' + v.model + ' ' + (v.trim || '');
  var dealerName = v.dealer && v.dealer.name ? v.dealer.name : 'Dealer';
  var dealerLoc = [v.dealer && v.dealer.city, v.dealer && v.dealer.state].filter(Boolean).join(', ');

  var detail = document.getElementById('detail');
  detail.innerHTML =
    '<div class="detail-header">' +
      '<h2>' + title.trim() + ' - ' + price + (v.mileage ? ', ' + v.mileage.toLocaleString() + ' mi' : '') + '</h2>' +
      '<button class="close-btn" onclick="closeDetail()">&times;</button>' +
    '</div>' +
    (photos.length ? (
      '<div class="gallery">' +
        '<img id="gallery-img" src="' + photos[0] + '" alt="' + title.trim() + '">' +
        (photos.length > 1 ? (
          '<button class="gallery-nav gallery-prev" onclick="prevPhoto()">&lsaquo;</button>' +
          '<button class="gallery-nav gallery-next" onclick="nextPhoto()">&rsaquo;</button>'
        ) : '') +
        '<span class="gallery-counter" id="gallery-counter">1 / ' + photos.length + '</span>' +
      '</div>'
    ) : '') +
    '<div class="price-row">' +
      '<span class="mileage">' + (v.mileage ? v.mileage.toLocaleString() + ' mi' : '') + '</span>' +
      '<span class="price">' + price + '</span>' +
    '</div>' +
    '<div class="specs">' +
      specRow('Exterior Color', v.exteriorColor, 'Interior Color', v.interiorColor) +
      specRow('Transmission', v.transmission, 'Fuel', v.fuelType) +
      specRow('Drivetrain', v.drivetrain, 'Body Type', v.bodyType) +
      specRow('MPG', (v.mpgCity || '—') + ' city / ' + (v.mpgHighway || '—') + ' hwy', 'Doors', v.doors) +
      specRow('VIN', v.vin, '', '') +
    '</div>' +
    '<div class="dealer-section">' +
      '<div class="dealer-name">' + dealerName + '</div>' +
      '<div class="dealer-loc">' + dealerLoc + '</div>' +
    '</div>' +
    '<div class="actions">' +
      '<a href="' + v.listing_url + '" target="_blank" class="btn-view">View on IQ Auto Deals &#x2197;</a>' +
    '</div>';

  detail.classList.add('active');
  detail.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function specRow(label1, value1, label2, value2) {
  return '<div class="specs-row">' +
    '<div class="spec-item">' +
      '<div class="spec-label">' + label1 + '</div>' +
      '<div class="spec-value">' + (value1 || '—') + '</div>' +
    '</div>' +
    (label2 ? (
      '<div class="spec-item">' +
        '<div class="spec-label">' + label2 + '</div>' +
        '<div class="spec-value">' + (value2 || '—') + '</div>' +
      '</div>'
    ) : '') +
  '</div>';
}

function closeDetail() {
  selectedIndex = -1;
  document.getElementById('detail').classList.remove('active');
  document.getElementById('detail').innerHTML = '';
  renderCarousel();
}

function nextPhoto() {
  var v = vehicles[selectedIndex];
  var photos = v.photos && v.photos.length ? v.photos : [v.image_url];
  currentPhoto = (currentPhoto + 1) % photos.length;
  document.getElementById('gallery-img').src = photos[currentPhoto];
  document.getElementById('gallery-counter').textContent = (currentPhoto + 1) + ' / ' + photos.length;
}

function prevPhoto() {
  var v = vehicles[selectedIndex];
  var photos = v.photos && v.photos.length ? v.photos : [v.image_url];
  currentPhoto = (currentPhoto - 1 + photos.length) % photos.length;
  document.getElementById('gallery-img').src = photos[currentPhoto];
  document.getElementById('gallery-counter').textContent = (currentPhoto + 1) + ' / ' + photos.length;
}

window.parent.postMessage({ jsonrpc: '2.0', method: 'ui/ready', params: {} }, '*');
</script>
</body>
</html>
